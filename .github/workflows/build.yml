name: "👷‍♀️ Build"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: "Build (${{ matrix.configuration }})"
    timeout-minutes: 10
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # when and if we have external dependencies
      # - name: Cache Swift Package Manager
      #   uses: actions/cache@v5
      #   with:
      #       path: |
      #           .tmp/DerivedData/**/SourcePackages
      #       key: ${{ runner.os }}-spm-${{ hashFiles('Rugzak.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
      #       restore-keys: |
      #           ${{ runner.os }}-spm-

      - name: Xcode Versions
        run: ls -la /Applications/Xcode*

      - name: Xcode Select
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Xcode Select
        run: xcode-select -p

      - name: XcodeBuild Version
        run: xcodebuild -version

      - name: Install macFUSE (build-time headers and pkg-config)
        run: brew install --cask macfuse

      - name: Checkout vendored dependencies
        run: ./scripts/vendor_init.sh

      - name: Build vendored dependencies
        run: ./scripts/vendor_build.sh

      - name: Set build
        run: agvtool new-version ${{ github.run_number }}

      - name: Build info
        run: ./scripts/generate_build_info.sh

      - name: Build
        run: |
          if [ "${{ matrix.configuration }}" = "Debug" ]; then
            ./scripts/build.sh --debug
          else
            ./scripts/build.sh
          fi
