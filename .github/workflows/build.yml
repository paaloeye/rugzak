name: "👷‍♀️ Build"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: "Build (${{ matrix.configuration }})"
    timeout-minutes: 10
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache vendered dependencies
        uses: actions/cache@v5
        with:
          path: |
            vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('scripts/vendor_init.sh') }}
          restore-keys: |
            ${{ runner.os }}-vendor-

      - name: Xcode Versions
        run: ls -la /Applications/Xcode*

      - name: Xcode Select
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Xcode Select
        run: xcode-select -p

      - name: XcodeBuild Version
        run: xcodebuild -version

      - name: Install build dependencies (macFUSE headers, Boost)
        run: brew install --cask macfuse && brew install boost

      - name: Checkout vendored dependencies
        run: ./scripts/vendor_init.sh

      - name: Build vendored dependencies
        run: ./scripts/vendor_build.sh

      - name: Set build
        run: agvtool new-version ${{ github.run_number }}

      - name: Build info
        run: ./scripts/generate_build_info.sh

      - name: Build
        run: |
          if [ "${{ matrix.configuration }}" = "Debug" ]; then
            ./scripts/build.sh --debug
          else
            ./scripts/build.sh
          fi
