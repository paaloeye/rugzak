name: "📦 Create DMG"

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dmg:
    name: Build and Create DMG
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache vendered dependencies
        uses: actions/cache@v5
        with:
          path: |
            vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('scripts/vendor_init.sh') }}
          restore-keys: |
            ${{ runner.os }}-vendor-

      - name: Xcode Select
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Xcode Select
        run: xcode-select -p

      - name: XcodeBuild Version
        run: xcodebuild -version

      - name: Install build dependencies (macFUSE headers, Boost)
        run: brew install --cask macfuse && brew install boost

      - name: Checkout vendored dependencies
        run: ./scripts/vendor_init.sh

      - name: Build vendored dependencies
        run: ./scripts/vendor_build.sh

      - name: Import signing certificate
        env:
          SIGNING_CERTIFICATE_P12_BASE64: ${{ secrets.SIGNING_CERTIFICATE_P12_BASE64 }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="${RUNNER_TEMP}/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 3600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          echo "${SIGNING_CERTIFICATE_P12_BASE64}" | base64 --decode > "${RUNNER_TEMP}/certificate.p12"
          security import "${RUNNER_TEMP}/certificate.p12" \
            -k "${KEYCHAIN_PATH}" \
            -P "${SIGNING_CERTIFICATE_PASSWORD}" \
            -T /usr/bin/codesign \
            > /dev/null
          security list-keychain -d user -s "${KEYCHAIN_PATH}"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
        run: |
          mkdir -p "${RUNNER_TEMP}/private_keys"
          echo "${ASC_API_KEY_BASE64}" | base64 --decode \
            > "${RUNNER_TEMP}/private_keys/AuthKey_${ASC_API_KEY_ID}.p8"

      - name: Set build
        run: agvtool new-version ${{ github.run_number }}

      - name: Build
        run: ./scripts/generate_build_info.sh

      - name: Create DMG
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER: ${{ secrets.ASC_API_ISSUER }}
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
          SIGNING_TEAM_ID: ${{ secrets.SIGNING_TEAM_ID }}
        run: |
          ./scripts/create_dmg.sh \
            --sign "${SIGNING_IDENTITY}" \
            --notarize "${SIGNING_TEAM_ID}" \
            --api-key "${RUNNER_TEMP}/private_keys/AuthKey_${ASC_API_KEY_ID}.p8" \
            --api-key-id "${ASC_API_KEY_ID}" \
            --api-issuer "${ASC_API_ISSUER}" \
            --verbose

      - name: Get DMG info
        id: dmg_info
        run: |
          DMG_FILE=$(find .dist -name "*.dmg" -type f | head -n 1)
          DMG_NAME=$(basename "${DMG_FILE}")
          DMG_SIZE=$(du -sh "${DMG_FILE}" | cut -f1)
          DMG_SHA256=$(shasum -a 256 "${DMG_FILE}" | cut -d' ' -f1)

          echo "dmg_file=${DMG_FILE}" >> $GITHUB_OUTPUT
          echo "dmg_name=${DMG_NAME}" >> $GITHUB_OUTPUT
          echo "dmg_size=${DMG_SIZE}" >> $GITHUB_OUTPUT
          echo "dmg_sha256=${DMG_SHA256}" >> $GITHUB_OUTPUT

          echo "### DMG Build Complete 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**File**: \`${DMG_NAME}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Size**: ${DMG_SIZE}" >> $GITHUB_STEP_SUMMARY
          echo "**SHA256**: \`${DMG_SHA256}\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          path: .dist/*.dmg
          retention-days: 30
          if-no-files-found: error
          include-hidden-files: true # required due to `.dist` being ignored when `false`
          archive: false

      - name: Clean up keychain and API key
        if: ${{ always() }}
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
        run: |
          security delete-keychain "${RUNNER_TEMP}/signing.keychain-db" || true
          rm -f "${RUNNER_TEMP}/certificate.p12"
          rm -f "${RUNNER_TEMP}/private_keys/AuthKey_${ASC_API_KEY_ID}.p8"

      - name: Extract version from tag
        id: version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          case "$VERSION" in
            *-*) echo "prerelease=true" >> $GITHUB_OUTPUT ;;
            *) echo "prerelease=false" >> $GITHUB_OUTPUT ;;
          esac

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: .dist/*.dmg
          generate_release_notes: true
          prerelease: ${{ steps.version.outputs.prerelease }}
          body: |
            ## Rugzak ${{ github.ref_name }}

            ### Installation
            1. Download the DMG file below
            2. Open the DMG
            3. Drag Rugzak to Applications

            ### Build Information
            - **Size**: ${{ steps.dmg_info.outputs.dmg_size }}
            - **SHA256**: `${{ steps.dmg_info.outputs.dmg_sha256 }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
