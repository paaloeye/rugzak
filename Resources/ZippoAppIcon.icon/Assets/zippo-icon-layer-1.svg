<?xml version="1.0" encoding="UTF-8"?>
<!-- Layer 1: Backpack body — main shape (steel navy) -->
<svg width="1024px" height="1024px" viewBox="0 0 1024 1024" version="1.1"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <title>zippo-icon-layer-1</title>
    <defs>
        <!-- Body gradient: top highlight → deep navy -->
        <linearGradient x1="30%" y1="0%" x2="70%" y2="100%" id="bodyGradient">
            <stop stop-color="#4A6FA5" offset="0%"/>
            <stop stop-color="#2C3E6B" offset="55%"/>
            <stop stop-color="#1A2744" offset="100%"/>
        </linearGradient>
        <!-- Dark mode body gradient -->
        <linearGradient x1="30%" y1="0%" x2="70%" y2="100%" id="bodyGradientDark">
            <stop stop-color="#3A5585" offset="0%"/>
            <stop stop-color="#1E2D52" offset="55%"/>
            <stop stop-color="#111B33" offset="100%"/>
        </linearGradient>
        <clipPath id="iconClip">
            <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230"/>
        </clipPath>
    </defs>
    <g id="zippo-icon-layer-1" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd" clip-path="url(#iconClip)">
        <!-- Background fill -->
        <!-- <rect x="0" y="0" width="1024" height="1024" fill="url(#bodyGradient)"/> -->

        <!-- Shoulder straps — two arching loops at top
        <path d="M380,260 C380,180 430,150 480,150 L480,220 C450,220 440,235 440,260 Z"
              fill="#1A2744" opacity="0.7"/>
        <path d="M644,260 C644,180 594,150 544,150 L544,220 C574,220 584,235 584,260 Z"
              fill="#1A2744" opacity="0.7"/> -->

        <!-- Main backpack body — rounded rectangle -->
        <rect x="280" y="255" width="464" height="580" rx="60" ry="60"
              fill="url(#bodyGradient)"/>

        <!-- Body right-side subtle shadow for depth -->
        <!-- <path d="M700,255 L740,255 Q744,255 744,259 L744,835 Q744,839 740,839 L700,839 Z"
              fill="#1A2744" opacity="0.3"/> -->

        <!-- Top rim above zipper -->
        <!-- <rect x="280" y="255" width="464" height="55" rx="0" ry="0"
              fill="#1A2744" opacity="0.4"/>
        <rect x="280" y="255" width="464" height="55" rx="0" ry="0"
              fill="none" stroke="#3D5A99" stroke-width="3" opacity="0.6"/> -->
    </g>
</svg>
